<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Durham Hidden Waterways — 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080c14; overflow:hidden; font-family:-apple-system,sans-serif; }
.label-street {
  color:rgba(200,190,170,.6); font-size:9px; letter-spacing:.06em;
  text-transform:uppercase; pointer-events:none; white-space:nowrap;
  text-shadow:0 0 5px #000,0 0 10px #000;
}
.label-building {
  color:rgba(220,210,190,.9); font-size:10px; font-weight:600;
  pointer-events:none; white-space:nowrap;
  text-shadow:0 0 6px #000,0 0 14px #000;
}
#controls {
  position:absolute; top:20px; left:20px;
  background:rgba(10,12,20,.88); border:1px solid rgba(255,255,255,.1);
  border-radius:12px; padding:16px 20px; backdrop-filter:blur(8px);
  z-index:10; min-width:220px;
}
#controls h2 { font-size:13px; font-weight:600; letter-spacing:.12em;
  text-transform:uppercase; color:#aaa; margin-bottom:14px; }
.layer-toggle { display:flex; align-items:center; gap:10px; margin-bottom:10px;
  cursor:pointer; user-select:none; }
.layer-toggle input[type=checkbox] { display:none; }
.toggle-pill { width:34px; height:18px; border-radius:9px; background:#333;
  position:relative; transition:background .2s; flex-shrink:0; }
.toggle-pill::after { content:''; position:absolute; width:14px; height:14px;
  border-radius:50%; background:#888; top:2px; left:2px;
  transition:transform .2s,background .2s; }
input:checked + .toggle-pill { background:#2a4a6a; }
input:checked + .toggle-pill::after { transform:translateX(16px); background:#fff; }
.layer-label { font-size:13px; }
.layer-sublabel { font-size:11px; color:#666; margin-top:1px; }
.legend-row { margin:2px 0 10px 44px; font-size:10px; color:#555; line-height:1.8; }
#back-btn {
  position:absolute; top:20px; right:20px; z-index:10;
  background:rgba(10,12,20,.88); border:1px solid #2a3f5f;
  color:#aaa; padding:8px 14px; border-radius:8px;
  font-size:12px; cursor:pointer; letter-spacing:.05em; backdrop-filter:blur(4px);
}
#back-btn:hover { color:#e0e0e0; }
#status { position:absolute; bottom:20px; left:20px; font-size:11px; color:#444; z-index:10; }
#loading { position:absolute; inset:0; display:flex; align-items:center;
  justify-content:center; color:#666; font-size:13px; letter-spacing:.08em;
  pointer-events:none; z-index:20; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="loading">Loading…</div>
<div id="controls">
  <h2>Durham Waterways</h2>
  <label class="layer-toggle">
    <input type="checkbox" id="t-river"/>
    <div class="toggle-pill"></div>
    <div><div class="layer-label" style="color:#29b6f6">River Mode</div>
         <div class="layer-sublabel">Smoothed merged network</div></div>
  </label>
  <label class="layer-toggle">
    <input type="checkbox" id="t-streams" checked/>
    <div class="toggle-pill"></div>
    <div><div class="layer-label" style="color:#4fc3f7">Open Channels</div>
         <div class="layer-sublabel">Above-ground streams</div></div>
  </label>
  <label class="layer-toggle">
    <input type="checkbox" id="t-culverts" checked/>
    <div class="toggle-pill"></div>
    <div><div class="layer-label" style="color:#ffb300">Underground Pipes</div>
         <div class="layer-sublabel">Width = creek confidence</div></div>
  </label>
  <div class="legend-row">
    <span style="color:#fff176">━━</span> Ellerbe ≥60" (trunk)<br/>
    <span style="color:#ff7043">━━</span> Ellerbe 36–59"<br/>
  </div>
  <label class="layer-toggle">
    <input type="checkbox" id="t-buildings" checked/>
    <div class="toggle-pill"></div>
    <div><div class="layer-label" style="color:#90a4ae">3D Buildings</div>
         <div class="layer-sublabel">OSM footprints</div></div>
  </label>
  <label class="layer-toggle">
    <input type="checkbox" id="t-streets" checked/>
    <div class="toggle-pill"></div>
    <div><div class="layer-label" style="color:#78909c">Streets + Labels</div>
         <div class="layer-sublabel">Named street overlay</div></div>
  </label>
  <label class="layer-toggle">
    <input type="checkbox" id="t-elevation" checked/>
    <div class="toggle-pill"></div>
    <div><div class="layer-label" style="color:#a78bfa">Elevation</div>
         <div class="layer-sublabel">W→E · 420→342 ft · USGS verified</div></div>
  </label>
</div>
<button id="back-btn">← Map View</button>
<div id="status"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }              from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { Line2 }                      from 'three/addons/lines/Line2.js';
import { LineGeometry }               from 'three/addons/lines/LineGeometry.js';
import { LineMaterial }               from 'three/addons/lines/LineMaterial.js';

// ── Geo ───────────────────────────────────────────────────────────────────────
const CX = -78.900, CY = 36.001, SCALE = 8000;
const COS_LAT = Math.cos(CY * Math.PI / 180);

function toXZ(lon, lat) {
  return [(lon - CX) * SCALE * COS_LAT, -(lat - CY) * SCALE];
}
function inBbox(lon, lat) {
  return lon > -78.921 && lon < -78.880 && lat > 35.986 && lat < 36.016;
}
function polyCenter(ring) {
  let sx = 0, sy = 0;
  for (const [x, y] of ring) { sx += x; sy += y; }
  return [sx / ring.length, sy / ring.length];
}

// ── Renderer ──────────────────────────────────────────────────────────────────
const canvas = document.createElement('canvas');
document.body.appendChild(canvas);

const renderer = new THREE.WebGLRenderer({ antialias: true, canvas });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:5';
document.body.appendChild(labelRenderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#080c14');
scene.fog = new THREE.FogExp2('#080c14', 0.0015);

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 1, 2000);
camera.position.set(120, 200, 190);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.07;
controls.minDistance = 60; controls.maxDistance = 700;
controls.maxPolarAngle = Math.PI * 0.48;
controls.autoRotate = true; controls.autoRotateSpeed = 0.22;

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  labelRenderer.setSize(innerWidth, innerHeight);
  scene.traverse(o => { if (o.material?.isLineMaterial) o.material.resolution.set(innerWidth, innerHeight); });
});

// ── Lights ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a2a3a, 1.6));
const sun = new THREE.DirectionalLight(0xfff4e0, 3.0);
sun.position.set(120, 200, 100); sun.castShadow = true;
Object.assign(sun.shadow.camera, { left:-280,right:280,top:280,bottom:-280,near:10,far:900 });
sun.shadow.mapSize.set(2048,2048); sun.shadow.bias = -0.0005;
scene.add(sun);
scene.add(Object.assign(new THREE.PointLight(0x0a2550, 2.5, 350), { position: new THREE.Vector3(0,-95,0) }));

// ── Root (floats as a unit) ───────────────────────────────────────────────────
const root = new THREE.Group();
scene.add(root);

// ── Hex slab ──────────────────────────────────────────────────────────────────
const HEX_VERTS = [
  [-78.8826948,36.001],[-78.8913474,36.0131244],
  [-78.9086526,36.0131244],[-78.9173052,36.001],
  [-78.9086526,35.9888756],[-78.8913474,35.9888756],
];
const hexShape = new THREE.Shape();
HEX_VERTS.forEach(([lon,lat],i) => {
  const [x,z] = toXZ(lon,lat);
  i===0 ? hexShape.moveTo(x,-z) : hexShape.lineTo(x,-z);
});
hexShape.closePath();

const slabGeom = new THREE.ExtrudeGeometry(hexShape, {
  depth:50, bevelEnabled:true, bevelThickness:8, bevelSize:8, bevelSegments:6,
});
const slab = new THREE.Mesh(slabGeom, [
  new THREE.MeshStandardMaterial({ color:0x111a28, roughness:0.88, metalness:0.04 }),
  new THREE.MeshStandardMaterial({ color:0x1a1208, roughness:0.97, metalness:0 }),
]);
slab.rotation.x = Math.PI / 2;
slab.castShadow = true; slab.receiveShadow = true;
root.add(slab);
root.add(Object.assign(
  new THREE.LineSegments(new THREE.EdgesGeometry(slabGeom, 20),
    new THREE.LineBasicMaterial({ color:0x2a3d58 })),
  { rotation: new THREE.Euler(Math.PI/2,0,0) }
));

const shadowDisc = new THREE.Mesh(
  new THREE.CircleGeometry(180,64),
  new THREE.MeshBasicMaterial({ color:0,transparent:true,opacity:0.48,depthWrite:false })
);
shadowDisc.rotation.x = -Math.PI/2; shadowDisc.position.y = -115;
scene.add(shadowDisc);

// ── Layer groups ──────────────────────────────────────────────────────────────
const streamGroup   = new THREE.Group(); root.add(streamGroup);
const culvertGroup  = new THREE.Group(); root.add(culvertGroup);
const riverGroup    = new THREE.Group(); root.add(riverGroup);
const buildingGroup = new THREE.Group(); root.add(buildingGroup);
const streetGroup   = new THREE.Group(); root.add(streetGroup);
const particleGroup = new THREE.Group(); root.add(particleGroup);
const elevGroup     = new THREE.Group(); root.add(elevGroup);
riverGroup.visible = false;

// ── Line2 helper (fast, supports linewidth) ────────────────────────────────────
function makeLine2(coords, yFn, color, linewidth) {
  const positions = [];
  for (const c of coords) {
    const [x, z] = toXZ(c[0], c[1]);
    const y = typeof yFn === 'function' ? yFn(c[0], c[1]) : yFn;
    positions.push(x, y, z);
  }
  if (positions.length < 6) return null;
  const geo = new LineGeometry();
  geo.setPositions(positions);
  const mat = new LineMaterial({
    color, linewidth,
    resolution: new THREE.Vector2(innerWidth, innerHeight),
  });
  return new Line2(geo, mat);
}

// ── Data loading ───────────────────────────────────────────────────────────────
const loadJSON = p => fetch(p).then(r => { if (!r.ok) throw new Error(p); return r.json(); });
const loading  = document.getElementById('loading');
const statusEl = document.getElementById('status');
let riverLoaded = false;

async function buildScene() {
  const [streams, culverts, streets, buildings, elevData] = await Promise.all([
    loadJSON('data/ellerbe_streams.geojson'),
    loadJSON('data/culverts_creek.geojson'),
    loadJSON('data/streets_downtown.geojson'),
    loadJSON('data/buildings_downtown.geojson'),
    loadJSON('data/elevation_profile.geojson'),
  ]);
  loading.style.display = 'none';

  // ── Elevation lookup ──────────────────────────────────────────────────────
  // Source: USGS EPQS sampled along actual WNW→ENE creek path.
  // Ellerbe Creek flows WEST→EAST through downtown (not south — AI overview wrong).
  // Verified: Wikipedia + USGS NWIS. West ~420 ft (upstream), East ~342 ft (downstream).
  const elevPts = elevData.features.map(f => ({
    lon:      f.geometry.coordinates[0],
    lat:      f.geometry.coordinates[1],
    elev:     f.properties.elevation_ft,
    upstream: f.properties.upstream,
  }));
  // Discard non-monotonic road-crossing spikes; use west/east extremes for scale
  const elevMin = Math.min(...elevPts.map(p => p.elev));
  const elevMax = Math.max(...elevPts.map(p => p.elev));
  const elevRange = elevMax - elevMin || 1;
  const ELEV_SCALE = 7;  // Three.js units across the full elevation range

  function nearestElev(lon, lat) {
    let best = null, bestD = Infinity;
    for (const p of elevPts) {
      const dx = (lon - p.lon) * COS_LAT, dy = lat - p.lat;
      const d  = dx*dx + dy*dy;
      if (d < bestD) { bestD = d; best = p.elev; }
    }
    return best ?? elevMin;
  }

  function elevY(lon, lat, base = 1.0) {
    const e = nearestElev(lon, lat);
    return base + ((e - elevMin) / elevRange) * ELEV_SCALE;
  }

  // ── Streets ───────────────────────────────────────────────────────────────
  const seenNames = new Set();
  let sc = 0;
  for (const feat of streets.features) {
    const coords = feat.geometry.coordinates;
    if (!coords.some(([ln,lt]) => inBbox(ln,lt))) continue;
    const hw  = feat.properties.highway;
    const col = hw==='primary' ? 0x585048 : hw==='secondary' ? 0x484440 : 0x3a3735;
    const w   = hw==='primary' ? 2.5 : hw==='secondary' ? 1.8 : 1.2;
    const l   = makeLine2(coords, 0.4, col, w);
    if (l) streetGroup.add(l);

    const name = feat.properties.name;
    if (name && !seenNames.has(name) && coords.length >= 2) {
      seenNames.add(name);
      const mid = coords[Math.floor(coords.length/2)];
      const [mx,mz] = toXZ(mid[0],mid[1]);
      const div = document.createElement('div');
      div.className='label-street'; div.textContent=name;
      const lbl = new CSS2DObject(div);
      lbl.position.set(mx,3,mz);
      streetGroup.add(lbl);
    }
    if (++sc > 600) break;
  }

  // ── Buildings (InstancedMesh — one draw call) ─────────────────────────────
  const MAX_BLDG = 900;
  const instMesh = new THREE.InstancedMesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({ color:0x1c2c40, roughness:0.85, metalness:0.05 }),
    MAX_BLDG
  );
  instMesh.castShadow = true;
  const dummy = new THREE.Object3D();
  const namedBldgs = [];
  let bi = 0;

  for (const feat of buildings.features) {
    if (bi >= MAX_BLDG) break;
    const ring = feat.geometry.coordinates[0];
    if (!ring || ring.length < 4) continue;
    if (!ring.some(([ln,lt]) => inBbox(ln,lt))) continue;
    const lons = ring.map(p=>p[0]), lats = ring.map(p=>p[1]);
    const [x1,z1] = toXZ(Math.min(...lons),Math.min(...lats));
    const [x2,z2] = toXZ(Math.max(...lons),Math.max(...lats));
    const w = Math.max(0.8,Math.abs(x2-x1)), d = Math.max(0.8,Math.abs(z2-z1));
    const h = Math.max(1.5,(feat.properties.height_m||8)*0.5);
    const [cx,cy] = polyCenter(ring);
    const [bx,bz] = toXZ(cx,cy);
    dummy.position.set(bx, h/2, bz);
    dummy.scale.set(w, h, d);
    dummy.updateMatrix();
    instMesh.setMatrixAt(bi, dummy.matrix);
    if (feat.properties.name) namedBldgs.push({name:feat.properties.name,x:bx,y:h+2,z:bz});
    bi++;
  }
  instMesh.instanceMatrix.needsUpdate = true;
  instMesh.count = bi;
  buildingGroup.add(instMesh);
  namedBldgs.forEach(b => {
    const div = document.createElement('div');
    div.className='label-building'; div.textContent=b.name;
    const lbl = new CSS2DObject(div);
    lbl.position.set(b.x,b.y,b.z);
    buildingGroup.add(lbl);
  });

  // ── Open channels (Line2 — fast, no TubeGeometry) ─────────────────────────
  let stc = 0;
  for (const feat of streams.features) {
    if (feat.geometry.type !== 'LineString') continue;
    const c = feat.geometry.coordinates;
    if (!c.some(([ln,lt]) => inBbox(ln,lt))) continue;
    const l = makeLine2(c, (lon,lat) => elevY(lon,lat,1.2), 0x0ea5e9, 3.5);
    if (l) streamGroup.add(l);
    if (++stc > 220) break;
  }

  // ── Culverts (Line2) ───────────────────────────────────────────────────────
  let cc = 0;
  for (const feat of culverts.features) {
    if (feat.properties.OPERATIONALAREA !== 'Ellerbe Creek') continue;
    if (feat.geometry.type !== 'LineString') continue;
    const c = feat.geometry.coordinates;
    const d = feat.properties.DIAMETER || 36;
    if (d < 48) continue;
    if (!c.some(([ln,lt]) => inBbox(ln,lt))) continue;
    const col = d>=96 ? 0xfff176 : d>=60 ? 0xffb300 : 0xff7043;
    const w   = 1.5 + (d/120)*2.0;
    const l   = makeLine2(c, (lon,lat) => elevY(lon,lat,0.5), col, w);
    if (l) culvertGroup.add(l);
    if (++cc > 160) break;
  }

  // ── Elevation markers (W→E transect, shows actual downstream flow) ─────────
  // Upstream markers are west (higher elev, smaller x), downstream are east (lower elev, larger x)
  const markerColors = { upstream: 0xa78bfa, downstream: 0x38bdf8 };
  for (const p of elevPts) {
    const [x,z] = toXZ(p.lon, p.lat);
    const y = elevY(p.lon, p.lat, 1.5);
    const col = p.upstream ? markerColors.upstream : markerColors.downstream;
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.8, 8, 8),
      new THREE.MeshStandardMaterial({ color: col, emissive: col, emissiveIntensity: 0.6 })
    );
    sphere.position.set(x, y, z);
    elevGroup.add(sphere);

    const div = document.createElement('div');
    const dir = p.upstream ? '↑ upstream' : '↓ downstream';
    div.style.cssText = `color:rgba(${p.upstream?'167,139,250':'56,189,248'},.9);font-size:9px;pointer-events:none;text-shadow:0 0 4px #000;white-space:nowrap;line-height:1.4`;
    div.innerHTML = `${Math.round(p.elev)} ft<br/><span style="font-size:8px;opacity:.7">${dir}</span>`;
    const lbl = new CSS2DObject(div);
    lbl.position.set(x, y + 4, z);
    elevGroup.add(lbl);
  }

  // Flow direction arrow (west→east across the hex surface)
  {
    const arrowMat = new THREE.MeshStandardMaterial({ color: 0x67e8f9, emissive: 0x0ea5e9, emissiveIntensity: 0.4 });
    const arrowBody = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,30,8), arrowMat);
    arrowBody.rotation.z = -Math.PI / 2;  // point east (+x)
    arrowBody.position.set(0, 0.8, 20);   // south of center, on slab
    const arrowHead = new THREE.Mesh(new THREE.ConeGeometry(1.2,5,8), arrowMat);
    arrowHead.rotation.z = -Math.PI / 2;
    arrowHead.position.set(16, 0.8, 20);
    elevGroup.add(arrowBody, arrowHead);

    const flowDiv = document.createElement('div');
    flowDiv.style.cssText = 'color:rgba(103,232,249,.8);font-size:9px;pointer-events:none;text-shadow:0 0 4px #000;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap';
    flowDiv.textContent = 'Ellerbe Creek flows →  WNW to ENE';
    const flowLbl = new CSS2DObject(flowDiv);
    flowLbl.position.set(0, 2, 22);
    elevGroup.add(flowLbl);
  }

  statusEl.textContent =
    `${stc} streams · ${cc} culverts · ${bi} buildings · ${seenNames.size} streets | `
  + `Ellerbe: ${Math.round(elevMax)} ft (W) → ${Math.round(elevMin)} ft (E) — flows WNW→ENE`;

  // ── Particles ─────────────────────────────────────────────────────────────
  const fishMat = new THREE.MeshStandardMaterial({ color:0x7dd3fc, emissive:0x0ea5e9, emissiveIntensity:0.9, transparent:true, opacity:0.75 });
  const fishGeo = new THREE.SphereGeometry(1.1, 6, 6);
  const streamPaths = streams.features
    .filter(f => f.geometry.type==='LineString' && f.geometry.coordinates.length>=4
      && f.geometry.coordinates.some(([ln,lt]) => inBbox(ln,lt)))
    .slice(0,40)
    .map(f => f.geometry.coordinates.map(([lon,lat]) => {
      const [x,z] = toXZ(lon,lat);
      return new THREE.Vector3(x, elevY(lon,lat,1.2), z);
    }));

  const fish = Array.from({length:22}, () => {
    const path = streamPaths[Math.floor(Math.random()*streamPaths.length)];
    if (!path) return null;
    const m = new THREE.Mesh(fishGeo, fishMat);
    particleGroup.add(m);
    return { mesh:m, path, t:Math.random(), spd:0.00025+Math.random()*0.00025 };
  }).filter(Boolean);

  const birdMat = new THREE.MeshStandardMaterial({ color:0xc0d8f0, emissive:0x8ab4d4, emissiveIntensity:0.4, transparent:true, opacity:0.55 });
  const birds = Array.from({length:12}, () => {
    const m = new THREE.Mesh(new THREE.SphereGeometry(0.9,5,5), birdMat);
    m.position.set((Math.random()-.5)*200, 70+Math.random()*40, (Math.random()-.5)*200);
    particleGroup.add(m);
    return { mesh:m, vx:(Math.random()-.5)*.13, vz:(Math.random()-.5)*.13, ph:Math.random()*Math.PI*2 };
  });

  // ── River mode: lazy load smooth data ─────────────────────────────────────
  document.getElementById('t-river').addEventListener('change', async e => {
    const on = e.target.checked;
    streamGroup.visible  = !on && document.getElementById('t-streams').checked;
    culvertGroup.visible = !on && document.getElementById('t-culverts').checked;
    riverGroup.visible   = on;
    if (on && !riverLoaded) {
      riverLoaded = true;
      statusEl.textContent = 'Loading smooth river…';
      const smooth = await loadJSON('data/river_smooth.geojson');
      let rc = 0;
      for (const feat of smooth.features) {
        if (feat.geometry.type !== 'LineString') continue;
        const c = feat.geometry.coordinates;
        if (!c.some(([ln,lt]) => inBbox(ln,lt))) continue;
        const l = makeLine2(c, (lon,lat) => elevY(lon,lat,1.5), 0x0369a1, 5);
        if (l) riverGroup.add(l);
        if (++rc > 350) break;
      }
      statusEl.textContent = `River: ${rc} smooth chains (elevation-adjusted)`;
    }
  });

  // ── Animation loop ────────────────────────────────────────────────────────
  function lerp3(pts, t) {
    const n=pts.length-1, i=Math.min(Math.floor(t*n),n-1), f=t*n-i;
    return pts[i].clone().lerp(pts[Math.min(i+1,n)],f);
  }
  let t0=null;
  function animate(ts) {
    requestAnimationFrame(animate);
    if (!t0) t0=ts;
    const t=(ts-t0)*.001;
    root.position.y = Math.sin(t*.42)*4;
    shadowDisc.position.y = -115-Math.sin(t*.42)*2;
    shadowDisc.material.opacity = 0.46+Math.sin(t*.42)*.05;
    fish.forEach(f => {
      f.t=(f.t+f.spd)%1;
      const p=lerp3(f.path,f.t);
      p.x+=Math.sin(ts*.004+f.t*10)*1.1;
      f.mesh.position.copy(p);
    });
    birds.forEach(b => {
      b.mesh.position.x+=b.vx; b.mesh.position.z+=b.vz;
      b.mesh.position.y=68+Math.sin(t*.4+b.ph)*10;
      if (Math.abs(b.mesh.position.x)>165) b.vx*=-1;
      if (Math.abs(b.mesh.position.z)>165) b.vz*=-1;
    });
    if (riverGroup.visible) {
      const pulse = 0.25+Math.sin(ts*.002)*.15;
      riverGroup.children.forEach(c => { if (c.material) c.material.color?.setHex(
        pulse > 0.3 ? 0x0ea5e9 : 0x0369a1); });
    }
    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  }
  requestAnimationFrame(animate);
}

buildScene().catch(err => {
  loading.textContent = 'Error: '+err.message;
  console.error(err);
});

// ── Controls ──────────────────────────────────────────────────────────────────
function wire(id, grp) {
  document.getElementById(id)?.addEventListener('change', e => { grp.visible=e.target.checked; });
}
wire('t-streams',   streamGroup);
wire('t-culverts',  culvertGroup);
wire('t-buildings', buildingGroup);
wire('t-streets',   streetGroup);
wire('t-elevation', elevGroup);

document.getElementById('back-btn').addEventListener('click', () => {
  window.parent !== window
    ? window.parent.postMessage('close-3d','*')
    : (window.location.href='/');
});
</script>
